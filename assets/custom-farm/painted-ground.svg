<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3400 2100" width="3400" height="2100">
  <!--
    Experiment: one continuous, painterly meadow that the whole farm sits IN,
    instead of raised diamond tiles. Vector, so it stays crisp at 4K / any zoom.
    World mapping: SVG (sx,sy) -> world (sx-900, sy-700). The farm clusters around
    SVG x 1140-1940, y 840-1280, so the path + river are routed around that.
  -->
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74ac4d"/>
      <stop offset="0.55" stop-color="#669c41"/>
      <stop offset="1" stop-color="#5a8d3a"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4a674"/>
      <stop offset="0.5" stop-color="#d8bd8e"/>
      <stop offset="1" stop-color="#bd9d6a"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b6b99"/>
      <stop offset="0.5" stop-color="#3f88b8"/>
      <stop offset="1" stop-color="#5fa9d2"/>
    </linearGradient>
    <radialGradient id="canopy" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6fa84a"/>
      <stop offset="1" stop-color="#3f6f2e"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="soft2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Base meadow -->
  <rect x="0" y="0" width="3400" height="2100" fill="url(#grass)"/>

  <!-- Soft painterly variation across the grass (lighter + darker patches) -->
  <g filter="url(#soft)" opacity="0.5">
    <ellipse cx="700" cy="500" rx="420" ry="260" fill="#83bb5b"/>
    <ellipse cx="2400" cy="430" rx="500" ry="300" fill="#7ab455"/>
    <ellipse cx="1500" cy="1500" rx="560" ry="320" fill="#84bd5c"/>
    <ellipse cx="2750" cy="1650" rx="480" ry="300" fill="#6fa648"/>
    <ellipse cx="450" cy="1500" rx="430" ry="300" fill="#5f9a3c"/>
    <ellipse cx="1850" cy="900" rx="520" ry="300" fill="#7cb453"/>
    <ellipse cx="1150" cy="300" rx="380" ry="220" fill="#5d973b"/>
  </g>

  <!-- Winding dirt path sweeping in from the top-left toward the farm -->
  <g>
    <path d="M -50 360 C 500 300 760 640 1180 760 C 1500 850 1720 980 1980 1150"
          fill="none" stroke="#a98c5e" stroke-width="170" stroke-linecap="round" filter="url(#soft2)" opacity="0.9"/>
    <path d="M -50 360 C 500 300 760 640 1180 760 C 1500 850 1720 980 1980 1150"
          fill="none" stroke="url(#path)" stroke-width="120" stroke-linecap="round"/>
    <path d="M -50 360 C 500 300 760 640 1180 760 C 1500 850 1720 980 1980 1150"
          fill="none" stroke="#e3cd9f" stroke-width="42" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- River along the right outskirts (where fishing lives) -->
  <g>
    <path d="M 2150 -40 C 2280 360 2520 760 2760 1180 C 2940 1500 3120 1820 3260 2160"
          fill="none" stroke="#1f5a86" stroke-width="240" stroke-linecap="round" filter="url(#soft2)"/>
    <path d="M 2150 -40 C 2280 360 2520 760 2760 1180 C 2940 1500 3120 1820 3260 2160"
          fill="none" stroke="url(#river)" stroke-width="180" stroke-linecap="round"/>
    <path d="M 2180 60 C 2320 420 2560 800 2790 1200"
          fill="none" stroke="#a9dcf2" stroke-width="20" stroke-linecap="round" opacity="0.55"/>
    <path d="M 2520 900 C 2640 1120 2820 1420 2980 1720"
          fill="none" stroke="#cdeaf8" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Tree canopies around the outer edges (kept clear of the farm centre) -->
  <g filter="url(#soft2)">
    <circle cx="240" cy="240" r="170" fill="url(#canopy)"/>
    <circle cx="420" cy="180" r="120" fill="url(#canopy)"/>
    <circle cx="3080" cy="360" r="150" fill="url(#canopy)"/>
    <circle cx="3180" cy="240" r="110" fill="url(#canopy)"/>
    <circle cx="180" cy="1850" r="160" fill="url(#canopy)"/>
    <circle cx="560" cy="1950" r="130" fill="url(#canopy)"/>
    <circle cx="3120" cy="1980" r="150" fill="url(#canopy)"/>
  </g>

  <!-- Little bushes scattered near the edges -->
  <g filter="url(#soft2)" opacity="0.9">
    <circle cx="120" cy="900" r="60" fill="#4f7f37"/>
    <circle cx="240" cy="1180" r="48" fill="#588a3d"/>
    <circle cx="3220" cy="1200" r="58" fill="#4f7f37"/>
    <circle cx="1500" cy="120" r="52" fill="#588a3d"/>
    <circle cx="900" cy="1980" r="50" fill="#4f7f37"/>
  </g>

  <!-- Wildflower flecks for life (subtle, spread out) -->
  <g opacity="0.85">
    <circle cx="520" cy="780" r="7" fill="#f6e9a0"/>
    <circle cx="560" cy="800" r="6" fill="#ffffff"/>
    <circle cx="640" cy="1180" r="7" fill="#e9c0d8"/>
    <circle cx="380" cy="1320" r="6" fill="#fff2b0"/>
    <circle cx="980" cy="1700" r="7" fill="#ffffff"/>
    <circle cx="1240" cy="1820" r="6" fill="#bcd0f0"/>
    <circle cx="2080" cy="1620" r="7" fill="#f6e9a0"/>
    <circle cx="2300" cy="1840" r="6" fill="#ffffff"/>
    <circle cx="2600" cy="520" r="7" fill="#e9c0d8"/>
    <circle cx="1900" cy="380" r="6" fill="#fff2b0"/>
    <circle cx="1380" cy="560" r="6" fill="#ffffff"/>
    <circle cx="2880" cy="980" r="7" fill="#bcd0f0"/>
  </g>
</svg>
